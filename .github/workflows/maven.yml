name: Java Maven CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

  trigger_jenkins:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Jenkins deployment job
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/TomcatDeployment/build" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"